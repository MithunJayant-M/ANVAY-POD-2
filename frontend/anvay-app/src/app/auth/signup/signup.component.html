<a routerLink="/" class="back-home-signup">← Home</a>

<div class="signup-container">
  <div class="signup-card">

    <div class="signup-header">
      <div class="anvay-brand size-md">
        <img src="assets/anvay-logo.svg" class="brand-icon" alt="ANVAY"/>
        <div class="brand-text">
          <span class="brand-name">ANVAY</span>
          <span class="brand-tag">Discover. Join. Host.</span>
        </div>
      </div>
    </div>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="signup-form">
      <div class="form-title">
        Register as {{ signupType === 'institution' ? 'Institution' : 'Student' }}
      </div>

      @if (signupType === 'institution') {
        <div class="form-group">
          <label>Institution Name *</label>
          <input type="text" formControlName="institutionName" placeholder="Enter institution name"
            [class.invalid]="form.get('institutionName')?.invalid && form.get('institutionName')?.touched"/>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Admin Name *</label>
            <input type="text" formControlName="adminName" placeholder="Your name"/>
          </div>
          <div class="form-group">
            <label>Phone</label>
            <input type="text" formControlName="phone" placeholder="Contact number"/>
          </div>
        </div>
        <div class="form-group">
          <label>Email *</label>
          <input type="email" formControlName="email" placeholder="Institution email"/>
        </div>
        <div class="form-group">
          <label>Password *</label>
          <input type="password" formControlName="password" placeholder="Min 6 characters"/>
        </div>
        <div class="form-group">
          <label>Address</label>
          <input type="text" formControlName="address" placeholder="Institution address"/>
        </div>
      }

      @if (signupType === 'student') {
        <div class="form-group">
          <label>Full Name *</label>
          <input type="text" formControlName="name" placeholder="Your full name"/>
        </div>
        <div class="form-group">
          <label>Email *</label>
          <input type="email" formControlName="email" placeholder="Your email"/>
        </div>
        <div class="form-group">
          <label>Password *</label>
          <input type="password" formControlName="password" placeholder="Min 6 characters"/>
        </div>
        <div class="form-group">
          <label>Institution ID (optional)</label>
          <input type="number" formControlName="institutionId" placeholder="Your institution ID"/>
        </div>
      }

      @if (errorMessage) {
        <div class="alert-error">{{ errorMessage }}</div>
      }

      <button type="submit" class="btn-primary" [disabled]="loading || form.invalid">
        {{ loading ? 'Registering...' : 'Create Account' }}
      </button>

      <p class="login-link">Already have an account? <a routerLink="/login">Sign In</a></p>
    </form>

  </div>
</div>
