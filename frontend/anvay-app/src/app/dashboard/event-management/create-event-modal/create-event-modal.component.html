<div class="modal-overlay" (click)="closeModal()">
  <div class="modal-content" (click)="$event.stopPropagation()">
    <!-- Modal Header -->
    <div class="modal-header">
      <h2>Create New Event</h2>
      <button class="close-btn" (click)="closeModal()">×</button>
    </div>

    <!-- Success Message -->
    <div *ngIf="success()" class="alert alert-success">
      ✓ Event created successfully!
    </div>

    <!-- Error Message -->
    <div *ngIf="error()" class="alert alert-danger">
      {{ error() }}
    </div>

    <!-- Form -->
    <form [formGroup]="eventForm" (ngSubmit)="onSubmit()" class="event-form">
      <div class="form-section">
        <!-- Event Title -->
        <div class="form-group">
          <label for="eventTitle">Event Title <span class="required">*</span></label>
          <input
            type="text"
            id="eventTitle"
            formControlName="eventTitle"
            placeholder="Enter event title"
            class="form-control"
            [class.is-invalid]="hasFieldError('eventTitle')"
          />
          <span *ngIf="hasFieldError('eventTitle')" class="error-message">
            {{ getFieldError('eventTitle') }}
          </span>
        </div>

        <!-- Description -->
        <div class="form-group">
          <label for="description">Description</label>
          <textarea
            id="description"
            formControlName="description"
            placeholder="Enter event description (optional)"
            rows="3"
            class="form-control"
            [class.is-invalid]="hasFieldError('description')"
          ></textarea>
          <span *ngIf="hasFieldError('description')" class="error-message">
            {{ getFieldError('description') }}
          </span>
        </div>

        <!-- Category -->
        <div class="form-group">
          <label for="category">Category <span class="required">*</span></label>
          <select
            id="category"
            formControlName="category"
            class="form-control"
            [class.is-invalid]="hasFieldError('category')"
          >
            <option value="">Select a category</option>
            <option *ngFor="let cat of categories" [value]="cat.value">
              {{ cat.label }}
            </option>
          </select>
          <span *ngIf="hasFieldError('category')" class="error-message">
            {{ getFieldError('category') }}
          </span>
        </div>

        <!-- Event Date and Time Row -->
        <div class="form-row">
          <div class="form-group">
            <label for="eventDate">Event Date <span class="required">*</span></label>
            <input
              type="date"
              id="eventDate"
              formControlName="eventDate"
              [min]="getTodayDate()"
              class="form-control"
              [class.is-invalid]="hasFieldError('eventDate')"
            />
            <span *ngIf="hasFieldError('eventDate')" class="error-message">
              {{ getFieldError('eventDate') }}
            </span>
          </div>

          <div class="form-group">
            <label for="eventTime">Event Time</label>
            <input
              type="time"
              id="eventTime"
              formControlName="eventTime"
              class="form-control"
            />
          </div>
        </div>

        <!-- Location -->
        <div class="form-group">
          <label for="location">Location <span class="required">*</span></label>
          <input
            type="text"
            id="location"
            formControlName="location"
            placeholder="Enter event location"
            class="form-control"
            [class.is-invalid]="hasFieldError('location')"
          />
          <span *ngIf="hasFieldError('location')" class="error-message">
            {{ getFieldError('location') }}
          </span>
        </div>

        <!-- Capacity and Club Row -->
        <div class="form-row">
          <div class="form-group">
            <label for="capacity">Capacity</label>
            <input
              type="number"
              id="capacity"
              formControlName="capacity"
              placeholder="Max participants"
              min="1"
              class="form-control"
              [class.is-invalid]="hasFieldError('capacity')"
            />
            <span *ngIf="hasFieldError('capacity')" class="error-message">
              {{ getFieldError('capacity') }}
            </span>
          </div>

          <div class="form-group">
            <label for="clubId">Associated Club</label>
            <select
              id="clubId"
              formControlName="clubId"
              class="form-control"
            >
              <option value="">None</option>
              <option *ngFor="let club of clubs()" [value]="club.clubId">
                {{ club.clubName }}
              </option>
            </select>
          </div>
        </div>
      </div>

      <!-- Form Actions -->
      <div class="modal-footer">
        <button
          type="button"
          class="btn btn-cancel"
          (click)="closeModal()"
          [disabled]="submitting()"
        >
          Cancel
        </button>
        <button
          type="submit"
          class="btn btn-submit"
          [disabled]="submitting() || eventForm.invalid"
        >
          <span *ngIf="!submitting()">Create Event</span>
          <span *ngIf="submitting()">
            <span class="spinner-small"></span> Creating...
          </span>
        </button>
      </div>
    </form>
  </div>
</div>
