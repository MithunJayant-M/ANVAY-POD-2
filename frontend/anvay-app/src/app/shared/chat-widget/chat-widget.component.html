<!-- Floating action button -->
<button class="chat-fab" (click)="toggleChat()" [class.fab-open]="isOpen" title="Anvay Support Bot">
  <svg *ngIf="!isOpen" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="24" height="24">
    <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/>
  </svg>
  <svg *ngIf="isOpen" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="22" height="22">
    <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
  </svg>
</button>

<!-- Chat panel -->
<div class="chat-panel" [class.panel-open]="isOpen">

  <!-- Header -->
  <div class="chat-header">
    <div class="chat-header-left">
      <div class="chat-avatar">A</div>
      <div>
        <div class="chat-title">Anvay Support Bot</div>
        <div class="chat-subtitle">
          <span class="offline-dot"></span>Offline Mode · Pod 2 only
        </div>
      </div>
    </div>
    <button class="chat-clear-btn" (click)="clearChat()" title="Clear chat">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="15" height="15">
        <polyline points="3 6 5 6 21 6"/>
        <path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/>
        <path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/>
      </svg>
    </button>
  </div>

  <!-- Messages -->
  <div class="chat-messages">

    <div
      *ngFor="let msg of messages"
      class="chat-msg"
      [class.msg-user]="msg.role === 'user'"
      [class.msg-bot]="msg.role === 'assistant'">
      <div class="msg-bubble">{{msg.content}}</div>
      <div class="msg-time">{{msg.timestamp | date:'h:mm a'}}</div>
    </div>

    <!-- Typing indicator -->
    <div class="chat-msg msg-bot" *ngIf="isTyping">
      <div class="msg-bubble typing-bubble">
        <span class="dot"></span><span class="dot"></span><span class="dot"></span>
      </div>
    </div>

    <!-- Quick-reply chips (shown after every bot message) -->
    <div class="quick-replies" *ngIf="showQuickReplies">
      <button
        *ngFor="let qr of quickReplies"
        class="chip"
        (click)="sendQuickReply(qr)">
        <span class="chip-icon">{{qr.icon}}</span> {{qr.label}}
      </button>
    </div>

    <div #messagesEnd></div>
  </div>

  <!-- Input area -->
  <div class="chat-input-area">
    <textarea
      id="chat-input"
      class="chat-textarea"
      [(ngModel)]="inputText"
      (keydown)="onKeydown($event)"
      placeholder="Type a question or use buttons above…"
      rows="1"
      [disabled]="isTyping"
      maxlength="2000">
    </textarea>
    <button class="chat-send-btn" (click)="sendMessage()" [disabled]="!inputText.trim() || isTyping">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="18" height="18">
        <line x1="22" y1="2" x2="11" y2="13"/>
        <polygon points="22 2 15 22 11 13 2 9 22 2"/>
      </svg>
    </button>
  </div>

  <div class="chat-footer">Rule-based · No AI · Pod 2 scoped</div>
</div>
