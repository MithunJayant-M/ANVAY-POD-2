# ─────────────────────────────────────────
# Application
# ─────────────────────────────────────────
spring.application.name=anvay

# ─────────────────────────────────────────
# Server (RENDER FIX ✅)
# Render injects PORT — app MUST bind to it
# ─────────────────────────────────────────
server.port=${PORT:8080}

# ─────────────────────────────────────────
# Database (FAIL-FAST SAFE ✅)
# These MUST be provided in Render Env Vars
# ─────────────────────────────────────────
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# ─────────────────────────────────────────
# JPA / Hibernate
# ─────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Disable Flyway if not used
spring.flyway.enabled=false

# ─────────────────────────────────────────
# JWT (FAIL-FAST SAFE ✅)
# ─────────────────────────────────────────
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=86400000

# ─────────────────────────────────────────
# Super Admin (OK)
# ─────────────────────────────────────────
app.superadmin.name=Super Admin
app.superadmin.email=admin@anvay.com
app.superadmin.password=Admin@123

# ─────────────────────────────────────────
# Swagger / SpringDoc
# ─────────────────────────────────────────
springdoc.api-docs.enabled=true
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.try-it-out-enabled=true
springdoc.swagger-ui.operations-sorter=method
springdoc.packages-to-scan=com.cts.mfrp.anvay.controller

# ─────────────────────────────────────────
# CORS (FIXED KEY NAME ✅)
# ENV VARS CANNOT HAVE HYPHENS
# ─────────────────────────────────────────
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:*}

# ─────────────────────────────────────────
# Logging (TEMPORARY — REMOVE AFTER DEBUG)
# ─────────────────────────────────────────
logging.level.root=INFO
logging.level.org.springframework=INFO
