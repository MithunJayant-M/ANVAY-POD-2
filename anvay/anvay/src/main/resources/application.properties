# Connection URL (Using the Host and Port from your image)
spring.datasource.url=jdbc:mysql://anvay-swastikatinkhede-7df7.l.aivencloud.com:12534/defaultdb?ssl-mode=REQUIRED

# Credentials
spring.datasource.username=avnadmin
# For security, we kept as DB_PASSWORD so change this with actual password
spring.datasource.password=${DB_PASSWORD} 

# JPA/Hibernate Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Server
server.port=8081
spring.flyway.enabled=false

# JWT
app.jwt.secret=anvaySecretKeyForJWTTokenGenerationThatIsAtLeast256BitsLongForSecurity
app.jwt.expiration-ms=86400000

# Super Admin
app.superadmin.name=Super Admin
app.superadmin.email=admin@anvay.com
app.superadmin.password=Admin@123

# ── Swagger / SpringDoc (served on main port 8081) ───────────────────────────
springdoc.api-docs.enabled=true
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.try-it-out-enabled=true
springdoc.swagger-ui.operations-sorter=method
springdoc.packages-to-scan=com.cts.mfrp.anvay.controller

