spring.application.name=anvay

## Database
#spring.datasource.url=jdbc:mysql://localhost:3306/campus_management
#spring.datasource.username=root
#spring.datasource.password=swas
#
## JPA
#spring.jpa.hibernate.ddl-auto=update
#spring.jpa.show-sql=true
#spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Connection URL — overridable via DB_URL env var (.env / Render)
spring.datasource.url=${DB_URL}

# Credentials — read from environment; password has no default to fail fast
# if not provided rather than silently using a stale value
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# JPA/Hibernate Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Server — SERVER_PORT for local dev, PORT for Render's auto-injected port,
# falling back to 8081 if neither is set
server.port=${SERVER_PORT}
spring.flyway.enabled=false

# JWT
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=86400000

# Super Admin
app.superadmin.name=Super Admin
app.superadmin.email=admin@anvay.com
app.superadmin.password=Admin@123

# ── Swagger / SpringDoc (served on main port 8081) ───────────────────────────
springdoc.api-docs.enabled=true
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.try-it-out-enabled=true
springdoc.swagger-ui.operations-sorter=method
springdoc.packages-to-scan=com.cts.mfrp.anvay.controller

# ── Chatbot ───────────────────────────────────────────────────────────────────
# Rule-based keyword bot — no API key needed.
# Edit src/main/resources/chatbot_responses.json to update answers (restart required).
app.chors.allowed-origins=${APP-CORS-ALLOWED-ORIGINS}